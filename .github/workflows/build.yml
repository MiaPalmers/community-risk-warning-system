name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IS_DEPENDABOT_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]' }}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npm run typecheck

      - name: Create .env from secrets
        if: env.IS_DEPENDABOT_PR != 'true'
        shell: pwsh
        run: |
          $envContent = '${{ secrets.ENV_FILE }}'
          if ($envContent) {
            Set-Content -Path '.env' -Value $envContent -NoNewline
          }

      - name: Cache VLM model files
        if: env.IS_DEPENDABOT_PR != 'true'
        id: cache-vlm
        uses: actions/cache@v5
        with:
          path: resources/vlm
          key: vlm-jackrong-qwen3.5-4b-q4km-mmproj-sha256-v1

      - name: Download VLM model files
        if: env.IS_DEPENDABOT_PR != 'true' && steps.cache-vlm.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path resources/vlm

          Write-Host "Downloading llama-server (CUDA build)..."
          $llamaUrl = "https://github.com/ggml-org/llama.cpp/releases/download/b8864/llama-b8864-bin-win-cuda-12.4-x64.zip"
          $cudartUrl = "https://github.com/ggml-org/llama.cpp/releases/download/b8864/cudart-llama-bin-win-cuda-12.4-x64.zip"

          curl -L -o resources/vlm/llama.zip $llamaUrl
          curl -L -o resources/vlm/cudart.zip $cudartUrl

          Expand-Archive -Path resources/vlm/llama.zip -DestinationPath resources/vlm -Force
          Expand-Archive -Path resources/vlm/cudart.zip -DestinationPath resources/vlm -Force

          Remove-Item resources/vlm/llama.zip, resources/vlm/cudart.zip

          Write-Host "Downloading Jackrong/Qwen3.5-4B-Claude-4.6-Opus-Reasoning-Distilled-v2-GGUF Q4_K_M model (~2.55 GB)..."
          curl -L -o "resources/vlm/Qwen3.5-4B.Q4_K_M.gguf" "https://huggingface.co/Jackrong/Qwen3.5-4B-Claude-4.6-Opus-Reasoning-Distilled-v2-GGUF/resolve/main/Qwen3.5-4B.Q4_K_M.gguf"

          Write-Host "Downloading mmproj vision encoder (~644 MB)..."
          curl -L -o "resources/vlm/mmproj-BF16.gguf" "https://huggingface.co/Jackrong/Qwen3.5-4B-Claude-4.6-Opus-Reasoning-Distilled-v2-GGUF/resolve/main/mmproj-BF16.gguf"

          Write-Host "VLM files downloaded:"
          Get-ChildItem resources/vlm | Format-Table Name, Length

      - name: Verify VLM model file hashes
        if: env.IS_DEPENDABOT_PR != 'true'
        shell: pwsh
        run: |
          $expectedModelSha256 = "de8cf2454c46ec34e6b991dc11f5dd42d543926272d8a59d36ceb5a2eaf7962a"
          $expectedMmprojSha256 = "32c003c4247825cd765bd882c0c2d3b3b071f4f909aa00f9e1d6404ba2422cf0"

          function Assert-FileSha256($Path, $Expected) {
            $actual = (Get-FileHash -Algorithm SHA256 -Path $Path).Hash.ToLowerInvariant()
            if ($actual -ne $Expected) {
              throw "SHA256 mismatch for $Path. Expected $Expected, got $actual"
            }
          }

          Assert-FileSha256 "resources/vlm/Qwen3.5-4B.Q4_K_M.gguf" $expectedModelSha256
          Assert-FileSha256 "resources/vlm/mmproj-BF16.gguf" $expectedMmprojSha256

      - name: Build
        run: npm run build

      - name: Skip packaging for Dependabot PRs
        if: env.IS_DEPENDABOT_PR == 'true'
        run: echo "Skipping VLM download and Windows packaging for Dependabot pull requests."

      - name: Package
        if: env.IS_DEPENDABOT_PR != 'true'
        run: npm run package

      - name: Upload portable zip
        if: env.IS_DEPENDABOT_PR != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: windows-portable
          path: dist-electron/*.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: windows-portable
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: ./artifacts/*.zip
          generate_release_notes: true
