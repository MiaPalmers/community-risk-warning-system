name: Dependabot Review Gate

on: pull_request

permissions:
  pull-requests: read
  contents: read

jobs:
  dependabot:
    runs-on: ubuntu-latest
    # 只有当 PR 的发起者是 dependabot 时才触发
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Require manual review
        run: |
          echo "Dependabot PR: ${{ github.event.pull_request.title }}"
          echo "PR URL: ${{ github.event.pull_request.html_url }}"
          echo "Dependency updates require the normal build checks and a human merge decision."
