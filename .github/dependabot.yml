version: 2

updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 6
    cooldown:
      semver-major-days: 14
      semver-minor-days: 3
      semver-patch-days: 2
    labels:
      - 'dependencies'
      - 'dependabot'
      - 'npm'
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore(dev)'
      include: 'scope'
    groups:
      npm-production:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      npm-development:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:30'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 3
    cooldown:
      semver-major-days: 14
      semver-minor-days: 3
      semver-patch-days: 2
    labels:
      - 'dependencies'
      - 'dependabot'
      - 'github-actions'
    commit-message:
      prefix: 'ci'
      include: 'scope'
    groups:
      github-actions-non-major:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
